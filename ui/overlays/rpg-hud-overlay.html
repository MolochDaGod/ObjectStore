
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG UI Overlay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 
           FORCE TOP LAYER: 
           These settings ensure the UI sits ON TOP of your game canvas 
        */
        #ui-overlay-container {
            position: fixed; /* Sticks to the screen, ignoring parent scroll */
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none; /* Lets you click THROUGH empty spaces to the game */
            z-index: 9999; /* Higher than any canvas */
            font-family: 'Cinzel', serif;
            display: flex;
            align-items: flex-end; /* Pushes content to bottom */
            padding: 10px;
            box-sizing: border-box;
        }

        /* Re-enable clicking only on the actual UI elements */
        .ui-element {
            pointer-events: auto;
        }

        /* 
           VISUAL STYLING
           Mimicking the stone/gold texture with CSS only 
        */
        :root {
            --gold: #c5a059;
            --stone: #1a1a1a;
            --border-shadow: #000;
        }

        .panel-style {
            background: linear-gradient(to bottom, #2a2a2a, #111);
            border: 2px solid var(--gold);
            box-shadow: 
                inset 0 0 10px #000,
                0 0 10px rgba(0,0,0,0.8),
                inset 1px 1px 0 rgba(255,255,255,0.2);
            position: relative;
        }
        
        /* Gold rivets in corners */
        .panel-style::after, .panel-style::before {
            content: ''; position: absolute; width: 6px; height: 6px;
            background: var(--gold); border: 1px solid #fff; box-shadow: 0 0 3px gold;
        }
        .panel-style::before { top: 2px; left: 2px; }
        .panel-style::after { top: 2px; right: 2px; }

        .hotbar-slot {
            width: 48px; height: 48px;
            background: #000;
            border: 2px solid #444;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: #fff;
            box-shadow: inset 0 0 5px #000;
            position: relative;
            cursor: pointer;
            transition: all 0.1s;
        }
        .hotbar-slot:hover { border-color: var(--gold); transform: scale(1.05); }
        .hotbar-num { position: absolute; top: 2px; left: 4px; font-size: 10px; color: #aaa; }

        .circle-btn {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: radial-gradient(#333, #000);
            border: 2px solid var(--gold);
            display: flex; align-items: center; justify-content: center;
            color: var(--gold);
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            cursor: pointer;
        }
        .circle-btn:hover { background: #444; }

    </style>
</head>
<body style="background: #333; margin: 0;"> <!-- Placeholder BG so you can see it -->

    <!-- CONTAINER FOR UI -->
    <div id="ui-overlay-container">
        
        <!-- LEFT: Chat -->
        <div class="ui-element panel-style" style="width: 250px; height: 160px; display: flex; flex-direction: column; margin-right: 10px;">
            <div style="flex: 1; padding: 8px; font-size: 12px; color: #ccc; overflow-y: auto;">
                <div style="color: #c5a059">[System]: Welcome.</div>
                <div style="color: #66ff66">[Party]: Raid ready?</div>
            </div>
            <div style="height: 30px; border-top: 1px solid #444; background: rgba(0,0,0,0.5);">
                <input type="text" placeholder="Chat..." style="width: 100%; height: 100%; background: transparent; border: none; color: white; padding: 0 5px; outline: none;">
            </div>
        </div>

        <!-- CENTER: Hotbar (1-8) -->
        <div class="ui-element panel-style" style="flex: 1; display: flex; justify-content: center; padding: 10px; align-items: center; max-width: 600px;">
            <div style="display: flex; gap: 4px;">
                <!-- Slots 1-8 -->
                <div class="hotbar-slot"><span class="hotbar-num">1</span></div>
                <div class="hotbar-slot"><span class="hotbar-num">2</span></div>
                <div class="hotbar-slot"><span class="hotbar-num">3</span></div>
                <div class="hotbar-slot"><span class="hotbar-num">4</span></div>
                <div class="hotbar-slot"><span class="hotbar-num">5</span></div>
                <div class="hotbar-slot"><span class="hotbar-num">6</span></div>
                <div class="hotbar-slot"><span class="hotbar-num">7</span></div>
                <div class="hotbar-slot"><span class="hotbar-num">8</span></div>
            </div>
        </div>

        <!-- RIGHT: Status/Gear -->
        <div class="ui-element" style="width: 200px; display: flex; flex-direction: column; align-items: flex-end; margin-left: 10px;">
            <!-- Circle Buttons -->
            <div style="display: flex; gap: 5px; margin-bottom: -15px; z-index: 10; padding-right: 10px;">
                <div class="circle-btn">I</div>
                <div class="circle-btn">C</div>
                <div class="circle-btn">S</div>
            </div>
            
            <!-- Panel -->
            <div class="panel-style" style="width: 100%; height: 120px; display: flex; padding: 10px;">
                <!-- Portrait -->
                <div style="width: 50px; display: flex; flex-direction: column; align-items: center; gap: 5px;">
                    <div style="width: 40px; height: 40px; border-radius: 50%; background: #000; border: 1px solid var(--gold);"></div>
                    <div style="width: 100%; height: 4px; background: #300;"><div style="width: 80%; height: 100%; background: #d00;"></div></div>
                    <div style="width: 100%; height: 4px; background: #003;"><div style="width: 60%; height: 100%; background: #00d;"></div></div>
                </div>
                <!-- Gear List -->
                <div style="flex: 1; margin-left: 10px; color: #ccc; font-size: 10px;">
                    <div style="border-bottom: 1px solid #444; margin-bottom: 4px;">GEAR</div>
                    <div>1. Sword</div>
                    <div>2. Shield</div>
                    <div>3. Helm</div>
                </div>
            </div>
        </div>

    </div>

<script>window.parent.postMessage({ action: "ready" }, "*"); 
 
window.console = new Proxy(console, {
  get(target, prop) {
    if (['log', 'warn', 'error'].includes(prop)) {
      return new Proxy(target[prop], {
        apply(fn, thisArg, args) {
          fn.apply(thisArg, args);
          window.parent.postMessage({ action: 'console', 
            type: prop, 
            args: args.map((arg) => {
              try {
                return JSON.stringify(arg).replace(/^["']|["']$/g, '');
              } catch (e) {
                return arg;
              }
            }) 
          }, '*');
        }
      });
    }
    return target[prop];
  }
});
</script></body>
</html>
