<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grudge Studio Item Browser - AI-Powered</title>
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./css/tier-system.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    
    /* Header */
    .header {
      margin-bottom: 32px;
      border-bottom: 2px solid var(--border-color);
      padding-bottom: 20px;
    }
    .header h1 {
      font-size: 2.5rem;
      background: linear-gradient(135deg, var(--tier-7), var(--tier-8));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .subtitle {
      color: var(--text-dim);
      font-size: 1.1rem;
    }
    
    /* Stats Bar */
    .stats-bar {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      margin: 20px 0;
    }
    .stat-item {
      background: var(--card-bg);
      padding: 12px 20px;
      border-radius: 8px;
      border-left: 3px solid var(--tier-7);
    }
    .stat-label {
      font-size: 0.75rem;
      color: var(--text-dim);
      text-transform: uppercase;
    }
    .stat-value {
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--tier-7);
    }
    
    /* Search and Filters */
    .controls {
      background: var(--card-bg);
      padding: 24px;
      border-radius: 12px;
      margin-bottom: 24px;
    }
    .search-box {
      width: 100%;
      padding: 14px;
      background: var(--bg-dark);
      border: 2px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 1rem;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    .search-box:focus {
      outline: none;
      border-color: var(--tier-7);
    }
    
    .filter-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    
    /* Section */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 32px 0 16px;
    }
    .section-title {
      font-size: 1.5rem;
      color: var(--tier-7);
    }
    .section-count {
      color: var(--text-dim);
      font-size: 0.9rem;
    }
    
    /* Loading */
    .loading {
      text-align: center;
      padding: 60px;
      color: var(--text-dim);
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid var(--border-color);
      border-top: 4px solid var(--tier-7);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    /* Error State */
    .error-state {
      text-align: center;
      padding: 40px 20px;
      color: #ff4d4d;
      background: rgba(255, 77, 77, 0.1);
      border: 1px solid rgba(255, 77, 77, 0.3);
      border-radius: 12px;
      margin-bottom: 24px;
      display: none;
    }
    .error-state button {
      margin-top: 12px;
      padding: 8px 20px;
      background: #ff4d4d;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    
    /* Progress Bar for Image Generation */
    .progress-bar {
      width: 100%;
      height: 6px;
      background: var(--card-bg);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 12px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--tier-7), var(--tier-8));
      width: 0%;
      transition: width 0.3s;
    }
    
    /* Controls Toggle */
    .toggle-group {
      display: flex;
      gap: 8px;
    }
    .toggle-btn {
      padding: 8px 16px;
      background: var(--bg-dark);
      border: 2px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-primary);
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .toggle-btn:hover {
      border-color: var(--tier-7);
    }
    .toggle-btn.active {
      background: var(--tier-7);
      border-color: var(--tier-7);
      color: #000;
    }
    
    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-dim);
    }
    .empty-state-icon {
      font-size: 4rem;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    /* Item Detail Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--card-bg);
      border: 2px solid var(--border-color);
      border-radius: 16px;
      max-width: 600px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      padding: 32px;
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 12px; right: 16px;
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 1.5rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
    }
    .modal-close:hover {
      color: var(--text-primary);
      background: var(--bg-dark);
    }
    .modal-header {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 20px;
    }
    .modal-icon {
      width: 80px; height: 80px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      flex-shrink: 0;
    }
    .modal-title {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .modal-subtitle {
      color: var(--text-dim);
      font-size: 0.9rem;
    }
    .modal-section {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border-color);
    }
    .modal-section-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      color: var(--text-dim);
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .modal-lore {
      font-style: italic;
      color: var(--text-dim);
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 8px;
    }
    .stat-chip {
      background: var(--bg-dark);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.85rem;
    }
    .stat-chip-label {
      color: var(--text-dim);
      font-size: 0.7rem;
      text-transform: uppercase;
    }
    .stat-chip-value {
      font-weight: 600;
      color: var(--tier-7);
    }
    .ability-list {
      list-style: none;
      padding: 0;
    }
    .ability-list li {
      padding: 6px 0;
      font-size: 0.9rem;
      color: var(--text-primary);
      border-bottom: 1px solid rgba(61, 61, 61, 0.3);
    }
    .ability-list li:last-child { border-bottom: none; }
    .signature-ability {
      background: linear-gradient(135deg, rgba(212, 168, 75, 0.15), rgba(240, 216, 144, 0.05));
      padding: 10px 14px;
      border-radius: 8px;
      border-left: 3px solid var(--tier-7);
      margin-top: 8px;
      font-size: 0.9rem;
    }
    .passive-tag {
      display: inline-block;
      background: rgba(74, 158, 255, 0.15);
      color: var(--tier-3);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.8rem;
      margin: 3px 4px 3px 0;
    }
  </style>
</head>
<body>
  <!-- Grudge Auth SDK -->
  <script src="https://auth-gateway-flax.vercel.app/grudge-auth-sdk.js"></script>
  <script>document.addEventListener('DOMContentLoaded', function() { if (typeof GrudgeAuth !== 'undefined') GrudgeAuth.renderAuthBar(); });</script>

  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>&#9876;&#65039; Grudge Studio Item Browser</h1>
      <p class="subtitle">AI-Generated Images &bull; Tier-Based System &bull; Single Source of Truth</p>
      
      <!-- Stats Bar -->
      <div class="stats-bar">
        <div class="stat-item">
          <div class="stat-label">Total Items</div>
          <div class="stat-value" id="totalCount">-</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Weapons</div>
          <div class="stat-value" id="weaponCount">-</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Armor</div>
          <div class="stat-value" id="armorCount">-</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Materials</div>
          <div class="stat-value" id="materialCount">-</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Consumables</div>
          <div class="stat-value" id="consumableCount">-</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Images Cached</div>
          <div class="stat-value" id="imageCacheCount">0</div>
        </div>
      </div>
    </div>
    
    <!-- Error State -->
    <div class="error-state" id="errorState">
      <p id="errorMessage">Failed to load item data.</p>
      <button onclick="location.reload()">Retry</button>
    </div>

    <!-- Controls -->
    <div class="controls">
      <input type="text" class="search-box" id="searchBox" placeholder="&#128269; Search items by name, stat, or description...">
      
      <div class="filter-row">
        <div class="toggle-group">
          <button class="toggle-btn active" data-type="all">All</button>
          <button class="toggle-btn" data-type="weapon">Weapons</button>
          <button class="toggle-btn" data-type="armor">Armor</button>
          <button class="toggle-btn" data-type="material">Materials</button>
          <button class="toggle-btn" data-type="consumable">Consumables</button>
        </div>
        
        <div class="tier-filter">
          <span style="color: var(--text-dim); font-size: 0.85rem; margin-right: 8px;">Tier:</span>
          <button class="tier-filter-btn active" data-tier="all">All</button>
          <button class="tier-filter-btn" data-tier="1">1</button>
          <button class="tier-filter-btn" data-tier="2">2</button>
          <button class="tier-filter-btn" data-tier="3">3</button>
          <button class="tier-filter-btn" data-tier="4">4</button>
          <button class="tier-filter-btn" data-tier="5">5</button>
          <button class="tier-filter-btn" data-tier="6">6</button>
          <button class="tier-filter-btn" data-tier="7">7</button>
          <button class="tier-filter-btn" data-tier="8">8</button>
        </div>
        
        <button class="filter-btn" id="generateImagesBtn">&#127912; Generate Images</button>
        <button class="filter-btn" id="clearCacheBtn">&#128465;&#65039; Clear Cache</button>
      </div>
      
      <div class="progress-bar" id="progressBar" style="display: none;">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>
    
    <!-- Loading State -->
    <div class="loading" id="loadingState">
      <div class="spinner"></div>
      <p>Loading item data...</p>
    </div>
    
    <!-- Results -->
    <div id="results" style="display: none;">
      <div class="section-header">
        <h2 class="section-title">Items</h2>
        <span class="section-count" id="resultsCount">0 items</span>
      </div>
      <div class="items-grid" id="itemsGrid"></div>
    </div>
    
    <!-- Empty State -->
    <div class="empty-state" id="emptyState" style="display: none;">
      <div class="empty-state-icon">&#128269;</div>
      <h3>No items found</h3>
      <p>Try adjusting your search or filters</p>
    </div>
  </div>

  <!-- Item Detail Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalContent">
      <button class="modal-close" id="modalClose">&times;</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <script type="module">
    import { imageGenerator } from './utils/image-generator.js';
    import { itemRegistry } from './utils/item-registry.js';

    let currentFilters = { search: '', type: 'all', tier: 'all' };
    let loadErrors = [];

    async function init() {
      console.log('Initializing Grudge Studio Item Browser...');
      await loadAllData();
      setupEventListeners();
      renderItems();
      updateStats();
      if (loadErrors.length > 0) {
        showError('Partial load: ' + loadErrors.join(', ') + ' failed to load.');
      }
      console.log('Initialization complete!');
    }

    async function loadAllData() {
      // Load weapons
      try {
        const res = await fetch('./api/v1/weapons.json');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        for (const [category, catData] of Object.entries(data.categories)) {
          if (catData.items) {
            for (const item of catData.items) {
              for (let tier = 1; tier <= 8; tier++) {
                itemRegistry.register({ ...item, tier, id: item.id + '-t' + tier }, category, 'weapon');
              }
            }
          }
        }
      } catch (e) { console.error('Error loading weapons:', e); loadErrors.push('Weapons'); }

      // Load armor
      try {
        const res = await fetch('./api/v1/armor.json');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        for (const [material, matData] of Object.entries(data.materials)) {
          if (matData.items) {
            for (const item of matData.items) {
              for (let tier = 1; tier <= 8; tier++) {
                itemRegistry.register({ ...item, tier, id: item.id + '-t' + tier, material }, material, 'armor');
              }
            }
          }
        }
      } catch (e) { console.error('Error loading armor:', e); loadErrors.push('Armor'); }

      // Load materials
      try {
        const res = await fetch('./api/v1/materials.json');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        for (const [category, catData] of Object.entries(data.categories)) {
          if (catData.items) itemRegistry.registerBatch(catData.items, category, 'material');
        }
      } catch (e) { console.error('Error loading materials:', e); loadErrors.push('Materials'); }

      // Load consumables
      try {
        const res = await fetch('./api/v1/consumables.json');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        for (const [category, catData] of Object.entries(data.categories)) {
          if (catData.items) {
            // Fix: consumable categories share numeric IDs (1,2,3..)
            // Prefix category to make each item ID unique
            const fixedItems = catData.items.map(function(item) {
              return { ...item, id: category + '-' + String(item.id), emoji: item.icon || item.emoji };
            });
            itemRegistry.registerBatch(fixedItems, category, 'consumable');
          }
        }
      } catch (e) { console.error('Error loading consumables:', e); loadErrors.push('Consumables'); }

      console.log('Loaded data:', itemRegistry.getStats());
      const validation = itemRegistry.validate();
      if (!validation.valid) console.warn('Data validation issues:', validation.issues);
    }

    function showError(message) {
      document.getElementById('errorMessage').textContent = message;
      document.getElementById('errorState').style.display = 'block';
    }

    function setupEventListeners() {
      document.getElementById('searchBox').addEventListener('input', debounce(function(e) {
        currentFilters.search = e.target.value;
        renderItems();
      }, 300));

      document.querySelectorAll('[data-type]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          document.querySelectorAll('[data-type]').forEach(function(b) { b.classList.remove('active'); });
          btn.classList.add('active');
          currentFilters.type = btn.dataset.type;
          renderItems();
        });
      });

      document.querySelectorAll('[data-tier]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          document.querySelectorAll('[data-tier]').forEach(function(b) { b.classList.remove('active'); });
          btn.classList.add('active');
          currentFilters.tier = btn.dataset.tier;
          renderItems();
        });
      });

      document.getElementById('generateImagesBtn').addEventListener('click', function() {
        generateImagesForCurrentView();
      });

      document.getElementById('clearCacheBtn').addEventListener('click', function() {
        if (confirm('Clear all cached images?')) {
          imageGenerator.clearCache();
          updateStats();
          renderItems();
        }
      });

      document.getElementById('modalClose').addEventListener('click', closeModal);
      document.getElementById('modalOverlay').addEventListener('click', function(e) {
        if (e.target === e.currentTarget) closeModal();
      });
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeModal();
      });

      document.getElementById('itemsGrid').addEventListener('click', function(e) {
        var card = e.target.closest('.item-card');
        if (card) {
          var item = itemRegistry.getItem(card.dataset.itemId);
          if (item) openItemModal(item);
        }
      });
    }

    function renderItems() {
      var filters = {
        type: currentFilters.type === 'all' ? undefined : currentFilters.type,
        tier: currentFilters.tier === 'all' ? undefined : currentFilters.tier
      };
      var results = itemRegistry.search(currentFilters.search, filters);
      var grid = document.getElementById('itemsGrid');
      document.getElementById('loadingState').style.display = 'none';
      
      if (results.length === 0) {
        document.getElementById('results').style.display = 'none';
        document.getElementById('emptyState').style.display = 'block';
        return;
      }
      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('results').style.display = 'block';
      document.getElementById('resultsCount').textContent = results.length + ' items';
      grid.innerHTML = results.map(function(item) { return createItemCard(item); }).join('');
      restoreCachedImages();
    }

    function createItemCard(item) {
      var tier = item.tier || 1;
      var safeId = escapeAttr(item.id);
      return '<div class="item-card" data-tier="' + tier + '" data-item-id="' + safeId + '">' +
        '<div class="item-image-container">' +
          '<div class="item-image-skeleton" data-img-id="' + safeId + '"></div>' +
          '<span class="tier-badge tier-' + tier + '">T' + tier + '</span>' +
        '</div>' +
        '<div class="item-name">' + escapeHtml(item.name) + '</div>' +
        '<div class="item-meta">' + escapeHtml(item.primaryStat || item.category) + '</div>' +
      '</div>';
    }

    function restoreCachedImages() {
      document.querySelectorAll('.item-card').forEach(function(card) {
        var item = itemRegistry.getItem(card.dataset.itemId);
        if (!item) return;
        var baseId = item.id.replace(/-t\d+$/, '');
        var cacheKey = item.type + '-' + baseId;
        if (imageGenerator.generatedImages.has(cacheKey)) {
          var url = imageGenerator.generatedImages.get(cacheKey);
          var skeleton = card.querySelector('[data-img-id]');
          if (skeleton) {
            var img = document.createElement('img');
            img.src = url;
            img.className = 'item-image';
            img.alt = item.name;
            img.loading = 'lazy';
            skeleton.replaceWith(img);
          }
        }
      });
    }

    async function generateImagesForCurrentView() {
      var cards = document.querySelectorAll('.item-card');
      if (cards.length === 0) return;
      var btn = document.getElementById('generateImagesBtn');
      var progressBar = document.getElementById('progressBar');
      var progressFill = document.getElementById('progressFill');
      btn.disabled = true;
      btn.textContent = 'Generating...';
      progressBar.style.display = 'block';
      progressFill.style.width = '0%';
      var completed = 0;
      var total = Math.min(cards.length, 20);

      for (var i = 0; i < total; i++) {
        var card = cards[i];
        var item = itemRegistry.getItem(card.dataset.itemId);
        if (item) {
          try {
            var baseId = item.id.replace(/-t\d+$/, '');
            var baseItem = Object.assign({}, item, { id: baseId });
            var url = await imageGenerator.generateItemImage(baseItem, item.type);
            var skeleton = card.querySelector('[data-img-id]');
            if (skeleton) {
              var img = document.createElement('img');
              img.src = url;
              img.className = 'item-image';
              img.alt = item.name;
              img.loading = 'lazy';
              skeleton.replaceWith(img);
            }
          } catch (err) {
            console.error('Failed to generate image for ' + item.name + ':', err);
          }
        }
        completed++;
        progressFill.style.width = ((completed / total) * 100) + '%';
      }
      setTimeout(function() {
        btn.disabled = false;
        btn.textContent = 'Generate Images';
        progressBar.style.display = 'none';
        updateStats();
      }, 500);
    }

    function openItemModal(item) {
      var tier = item.tier || 1;
      var tierColor = 'var(--tier-' + tier + ')';
      var html = '<div class="modal-header">' +
        '<div class="modal-icon" style="background:linear-gradient(135deg,' + tierColor + ',rgba(0,0,0,0.3));border:2px solid ' + tierColor + ';">' +
          (item.emoji || '&#128230;') +
        '</div><div>' +
          '<div class="modal-title" style="color:' + tierColor + ';">' + escapeHtml(item.name) + '</div>' +
          '<div class="modal-subtitle">T' + tier + ' ' + capitalize(item.type) + ' &bull; ' + capitalize(item.category) +
            (item.material ? ' &bull; ' + capitalize(item.material) : '') +
          '</div></div></div>';

      if (item.lore || item.description) {
        html += '<div class="modal-section"><div class="modal-section-title">Lore</div>' +
          '<p class="modal-lore">&ldquo;' + escapeHtml(item.lore || item.description) + '&rdquo;</p></div>';
      }

      if (item.stats && Object.keys(item.stats).length > 0) {
        html += '<div class="modal-section"><div class="modal-section-title">Stats (at T' + tier + ')</div><div class="stat-grid">';
        for (var key in item.stats) {
          if (key.endsWith('PerTier')) continue;
          var val = item.stats[key];
          var ptKey = key.replace('Base', 'PerTier');
          if (key.endsWith('Base') && item.stats[ptKey] !== undefined) {
            val = val + (item.stats[ptKey] * (tier - 1));
          }
          var label = key.replace('Base', '').replace(/([A-Z])/g, ' ').trim();
          html += '<div class="stat-chip"><div class="stat-chip-label">' + escapeHtml(label) + '</div>' +
            '<div class="stat-chip-value">' + (typeof val === 'number' ? (val % 1 ? val.toFixed(1) : val) : val) + '</div></div>';
        }
        html += '</div></div>';
      }

      if (item.primaryStat || item.secondaryStat) {
        html += '<div class="modal-section"><div class="modal-section-title">Attributes</div><div class="stat-grid">';
        if (item.primaryStat) html += '<div class="stat-chip"><div class="stat-chip-label">Primary</div><div class="stat-chip-value">' + escapeHtml(item.primaryStat) + '</div></div>';
        if (item.secondaryStat) html += '<div class="stat-chip"><div class="stat-chip-label">Secondary</div><div class="stat-chip-value">' + escapeHtml(item.secondaryStat) + '</div></div>';
        html += '</div></div>';
      }

      if (item.abilities && item.abilities.length > 0) {
        html += '<div class="modal-section"><div class="modal-section-title">Abilities</div>';
        if (item.basicAbility) html += '<p style="margin-bottom:8px;font-size:0.9rem;"><strong>Basic:</strong> ' + escapeHtml(item.basicAbility) + '</p>';
        html += '<ul class="ability-list">';
        item.abilities.forEach(function(a) { html += '<li>&#9889; ' + escapeHtml(a) + '</li>'; });
        html += '</ul>';
        if (item.signatureAbility) html += '<div class="signature-ability"><strong>&#11088; Signature:</strong> ' + escapeHtml(item.signatureAbility) + '</div>';
        html += '</div>';
      }

      if (item.passives && item.passives.length > 0) {
        html += '<div class="modal-section"><div class="modal-section-title">Passives</div>';
        item.passives.forEach(function(p) { html += '<span class="passive-tag">' + escapeHtml(p) + '</span>'; });
        html += '</div>';
      }

      if (item.passive || item.effect || item.proc || item.setBonus) {
        html += '<div class="modal-section"><div class="modal-section-title">Equipment Effects</div><div class="stat-grid">';
        if (item.passive) html += '<div class="stat-chip"><div class="stat-chip-label">Passive</div><div class="stat-chip-value">' + escapeHtml(item.passive) + '</div></div>';
        if (item.attribute) html += '<div class="stat-chip"><div class="stat-chip-label">Attribute</div><div class="stat-chip-value">' + escapeHtml(item.attribute) + '</div></div>';
        if (item.effect) html += '<div class="stat-chip"><div class="stat-chip-label">Effect</div><div class="stat-chip-value">' + escapeHtml(item.effect) + '</div></div>';
        if (item.proc) html += '<div class="stat-chip"><div class="stat-chip-label">Proc</div><div class="stat-chip-value">' + escapeHtml(item.proc) + '</div></div>';
        if (item.setBonus) html += '<div class="stat-chip"><div class="stat-chip-label">Set Bonus</div><div class="stat-chip-value">' + escapeHtml(item.setBonus) + '</div></div>';
        html += '</div></div>';
      }

      if (item.craftedBy || item.gatheredBy) {
        html += '<div class="modal-section"><div class="modal-section-title">Source</div>';
        if (item.craftedBy) html += '<p style="font-size:0.9rem;">Crafted by: <strong>' + escapeHtml(item.craftedBy) + '</strong></p>';
        if (item.gatheredBy) html += '<p style="font-size:0.9rem;">Gathered by: <strong>' + escapeHtml(item.gatheredBy) + '</strong></p>';
        html += '</div>';
      }

      document.getElementById('modalBody').innerHTML = html;
      document.getElementById('modalContent').style.borderColor = tierColor;
      document.getElementById('modalOverlay').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
      document.body.style.overflow = '';
    }

    function updateStats() {
      var stats = itemRegistry.getStats();
      document.getElementById('totalCount').textContent = stats.totalItems;
      document.getElementById('weaponCount').textContent = stats.byType.weapon || 0;
      document.getElementById('armorCount').textContent = stats.byType.armor || 0;
      document.getElementById('materialCount').textContent = stats.byType.material || 0;
      document.getElementById('consumableCount').textContent = stats.byType.consumable || 0;
      document.getElementById('imageCacheCount').textContent = imageGenerator.getCacheStats().cached;
    }

    function debounce(fn, delay) {
      var timeout;
      return function() {
        var args = arguments;
        var ctx = this;
        clearTimeout(timeout);
        timeout = setTimeout(function() { fn.apply(ctx, args); }, delay);
      };
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function escapeAttr(str) {
      if (!str) return '';
      return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function capitalize(str) {
      if (!str) return '';
      return str.charAt(0).toUpperCase() + str.slice(1);
    }

    init();
  </script>
  <script src="./js/nav.js"></script>
</body>
</html>
