<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grudge Studio 2D Models Browser</title>
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./css/tier-system.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg-dark); color: var(--text-primary); min-height: 100vh; padding: 20px; }
    .container { max-width: 1600px; margin: 0 auto; }
    .header { margin-bottom: 32px; border-bottom: 2px solid var(--border-color); padding-bottom: 20px; }
    .header h1 { font-size: 2.5rem; background: linear-gradient(135deg, var(--tier-3), var(--tier-4)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
    .subtitle { color: var(--text-dim); font-size: 1.1rem; }
    .stats-bar { display: flex; gap: 16px; flex-wrap: wrap; margin: 20px 0; }
    .stat-item { background: var(--card-bg); padding: 10px 16px; border-radius: 8px; border-left: 3px solid var(--tier-4); }
    .stat-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; }
    .stat-value { font-size: 1.3rem; font-weight: bold; color: var(--tier-4); }
    .controls { background: var(--card-bg); padding: 20px; border-radius: 12px; margin-bottom: 24px; }
    .search-box { width: 100%; padding: 12px; background: var(--bg-dark); border: 2px solid var(--border-color); border-radius: 8px; color: var(--text-primary); font-size: 1rem; margin-bottom: 12px; }
    .search-box:focus { outline: none; border-color: var(--tier-4); }
    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 8px; }
    .filter-btn { padding: 6px 14px; background: var(--bg-dark); border: 2px solid var(--border-color); border-radius: 8px; color: var(--text-primary); cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
    .filter-btn:hover { border-color: var(--tier-4); }
    .filter-btn.active { background: var(--tier-4); border-color: var(--tier-4); color: #000; font-weight: 600; }
    .filter-label { color: var(--text-dim); font-size: 0.8rem; margin-right: 4px; }
    .results-header { display: flex; justify-content: space-between; align-items: center; margin: 24px 0 12px; }
    .results-title { font-size: 1.3rem; color: var(--tier-4); }
    .results-count { color: var(--text-dim); font-size: 0.85rem; }
    .char-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
    .char-card { background: var(--card-bg); border-radius: 12px; padding: 12px; cursor: default; transition: transform 0.2s, box-shadow 0.2s; border: 2px solid transparent; overflow: hidden; }
    .char-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.4); border-color: var(--tier-4); }
    .sprite-viewport { width: 100%; aspect-ratio: 1; border-radius: 8px; overflow: hidden; background: rgba(0,0,0,0.4); position: relative; image-rendering: pixelated; cursor: pointer; }
    .sprite-viewport canvas { width: 100%; height: 100%; image-rendering: pixelated; display: block; }
    .char-name { font-size: 0.9rem; font-weight: 600; color: var(--text-primary); margin-top: 8px; text-transform: capitalize; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .char-meta { font-size: 0.7rem; color: var(--text-dim); margin-bottom: 4px; }
    .char-uuid { font-size: 0.55rem; color: var(--tier-7); font-family: monospace; cursor: pointer; opacity: 0.6; transition: opacity 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .char-uuid:hover { opacity: 1; color: var(--tier-4); }
    .anim-select { width: 100%; padding: 5px 8px; background: var(--bg-dark); border: 2px solid var(--border-color); border-radius: 6px; color: var(--text-primary); font-size: 0.75rem; cursor: pointer; text-transform: capitalize; margin-top: 4px; }
    .anim-select:focus { outline: none; border-color: var(--tier-4); }
    .frame-info { font-size: 0.6rem; color: var(--text-dim); margin-top: 4px; text-align: center; }
    .loading { text-align: center; padding: 60px; color: var(--text-dim); }
    .spinner { width: 50px; height: 50px; border: 4px solid var(--border-color); border-top: 4px solid var(--tier-4); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-dim); }
    .play-pause { position:absolute; bottom:6px; right:6px; background:rgba(0,0,0,0.6); border:none; color:#fff; width:24px; height:24px; border-radius:50%; cursor:pointer; font-size:0.7rem; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 0.2s; }
    .sprite-viewport:hover .play-pause { opacity:1; }
    .dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:4px; vertical-align:middle; }
    .dot-ok { background:#4caf50; } .dot-warn { background:#ff9800; } .dot-err { background:#f44336; }
    .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:1000; justify-content:center; align-items:center; padding:20px; }
    .modal-overlay.active { display:flex; }
    .modal { background:var(--card-bg); border:2px solid var(--tier-4); border-radius:16px; max-width:900px; width:100%; max-height:90vh; overflow-y:auto; padding:32px; position:relative; }
    .modal-close { position:absolute; top:12px; right:16px; background:none; border:none; color:var(--text-dim); font-size:1.5rem; cursor:pointer; }
    .modal-close:hover { color:var(--text-primary); }
    .modal-preview { width:100%; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.4); border-radius:12px; padding:20px; margin-bottom:20px; min-height:200px; overflow:auto; }
    .modal-preview canvas { image-rendering:pixelated; }
    .modal-title { font-size:1.3rem; font-weight:700; margin-bottom:4px; text-transform:capitalize; }
    .modal-uuid { font-family:monospace; font-size:0.75rem; color:var(--tier-7); cursor:pointer; padding:4px 8px; background:var(--bg-dark); border-radius:4px; display:inline-block; margin-bottom:8px; }
    .modal-uuid:hover { color:var(--tier-4); }
    .modal-anim-row { display:flex; gap:8px; flex-wrap:wrap; margin:12px 0; }
    .modal-anim-btn { padding:6px 14px; background:var(--bg-dark); border:2px solid var(--border-color); border-radius:8px; color:var(--text-primary); cursor:pointer; font-size:0.8rem; text-transform:capitalize; transition:all 0.2s; }
    .modal-anim-btn:hover { border-color:var(--tier-4); }
    .modal-anim-btn.active { background:var(--tier-4); border-color:var(--tier-4); color:#000; font-weight:600; }
    .modal-controls { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin:12px 0; padding:12px; background:var(--bg-dark); border-radius:8px; }
    .modal-controls label { font-size:0.8rem; color:var(--text-dim); display:flex; align-items:center; gap:6px; }
    .modal-controls input[type=range] { width:100px; accent-color:var(--tier-4); }
    .modal-controls button { padding:4px 10px; background:var(--card-bg); border:1px solid var(--border-color); border-radius:6px; color:var(--text-primary); cursor:pointer; font-size:0.75rem; }
    .modal-controls button:hover { border-color:var(--tier-4); color:var(--tier-4); }
    .modal-controls button.active { background:var(--tier-4); color:#000; }
    .modal-info { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:12px; }
    .modal-info-item { background:var(--bg-dark); padding:8px 12px; border-radius:8px; font-size:0.85rem; }
    .modal-info-label { color:var(--text-dim); font-size:0.7rem; text-transform:uppercase; }
    .modal-info-value { color:var(--tier-4); font-weight:600; }
    .modal-path { margin-top:12px; padding:10px; background:var(--bg-dark); border-radius:8px; font-family:monospace; font-size:0.8rem; color:var(--tier-7); word-break:break-all; cursor:pointer; }
    .modal-path:hover { color:var(--tier-8); }
    .copy-toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:var(--tier-4); color:#000; padding:10px 24px; border-radius:8px; font-weight:600; z-index:2000; display:none; }
    .pagination { display:flex; gap:8px; justify-content:center; margin-top:24px; flex-wrap:wrap; }
    .page-btn { padding:8px 14px; background:var(--card-bg); border:2px solid var(--border-color); border-radius:8px; color:var(--text-primary); cursor:pointer; font-size:0.85rem; }
    .page-btn:hover { border-color:var(--tier-4); }
    .page-btn.active { background:var(--tier-4); border-color:var(--tier-4); color:#000; }
    .page-btn:disabled { opacity:0.4; cursor:default; }
    @media(max-width:768px) { .modal-info { grid-template-columns:1fr 1fr; } .char-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); } }
  </style>
</head>
<body>
  <script src="https://auth-gateway-flax.vercel.app/grudge-auth-sdk.js"></script>
  <script>document.addEventListener('DOMContentLoaded', function() { if (typeof GrudgeAuth !== 'undefined') GrudgeAuth.renderAuthBar(); });</script>
  <div class="container">
    <div class="header">
      <h1><img src="favicon.svg" alt="" style="height:1em;vertical-align:middle;margin-right:6px;">2D Models Browser</h1>
      <p class="subtitle">Animated sprite browser with UUIDs &mdash; Grudge Studio ObjectStore v2</p>
      <div class="stats-bar" id="statsBar"></div>
    </div>
    <div class="controls">
      <input type="text" class="search-box" id="searchBox" placeholder="&#128269; Search by name, category, or UUID...">
      <div class="filter-row"><span class="filter-label">Category:</span><div id="catFilters"></div></div>
      <div class="filter-row"><span class="filter-label">Source:</span><div id="srcFilters"></div></div>
    </div>
    <div class="loading" id="loadingState"><div class="spinner"></div><p>Loading sprite data...</p></div>
    <div id="resultsArea" style="display:none;">
      <div class="results-header"><h2 class="results-title">Sprites</h2><span class="results-count" id="resultsCount"></span></div>
      <div class="char-grid" id="charGrid"></div>
      <div class="pagination" id="pagination"></div>
    </div>
    <div class="empty-state" id="emptyState" style="display:none;">
      <div style="font-size:4rem;margin-bottom:12px;opacity:0.3;">&#128269;</div>
      <h3>No characters found</h3><p>Try adjusting your search or filters</p>
    </div>
  </div>
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal"><button class="modal-close" id="modalClose">&times;</button><div id="modalBody"></div></div>
  </div>
  <div class="copy-toast" id="copyToast">Copied!</div>
  <script src="./js/nav.js"></script>
  <script>
  (function() {
    'use strict';
    var chars = [], filtered = [], page = 0, SIZE = 48;
    var filters = { q: '', cat: 'all', src: 'all' };
    var anims = {}, obs, BASE = '.';

    async function init() {
      try {
        var r = await fetch(BASE + '/api/v1/sprite-characters.json');
        if (!r.ok) throw new Error('HTTP ' + r.status);
        var d = await r.json();
        chars = d.characters || [];
        stats(d); buildFilters(); events(); setupObs(); apply();
      } catch(e) {
        document.getElementById('loadingState').innerHTML = '<p style="color:#ff4d4d;">Failed: ' + e.message + '</p>';
      }
    }

    function stats(d) {
      var m = {}; chars.forEach(function(c) { m[c.category] = (m[c.category]||0)+1; });
      var h = '<div class="stat-item"><div class="stat-label">Characters</div><div class="stat-value">'+d.totalCharacters+'</div></div>';
      h += '<div class="stat-item"><div class="stat-label">Animations</div><div class="stat-value">'+d.totalAnimations+'</div></div>';
      for (var k in m) h += '<div class="stat-item"><div class="stat-label">'+k+'</div><div class="stat-value">'+m[k]+'</div></div>';
      document.getElementById('statsBar').innerHTML = h;
    }

    function buildFilters() {
      var cs = {}, ss = {};
      chars.forEach(function(c) { cs[c.category]=1; ss[c.source]=1; });
      var h = '<button class="filter-btn active" data-v="all">All</button>';
      Object.keys(cs).sort().forEach(function(c) { h += '<button class="filter-btn" data-v="'+c+'">'+c.charAt(0).toUpperCase()+c.slice(1)+'</button>'; });
      document.getElementById('catFilters').innerHTML = h;
      h = '<button class="filter-btn active" data-v="all">All</button>';
      Object.keys(ss).sort().forEach(function(s) { h += '<button class="filter-btn" data-v="'+s+'">'+s+'</button>'; });
      document.getElementById('srcFilters').innerHTML = h;
    }

    function events() {
      var t;
      document.getElementById('searchBox').addEventListener('input', function(e) {
        clearTimeout(t); t = setTimeout(function() { filters.q = e.target.value.toLowerCase(); page=0; apply(); }, 200);
      });
      document.getElementById('catFilters').addEventListener('click', function(e) {
        var b = e.target.closest('[data-v]'); if (!b) return;
        this.querySelectorAll('[data-v]').forEach(function(x){x.classList.remove('active');}); b.classList.add('active');
        filters.cat = b.dataset.v; page=0; apply();
      });
      document.getElementById('srcFilters').addEventListener('click', function(e) {
        var b = e.target.closest('[data-v]'); if (!b) return;
        this.querySelectorAll('[data-v]').forEach(function(x){x.classList.remove('active');}); b.classList.add('active');
        filters.src = b.dataset.v; page=0; apply();
      });
      document.getElementById('modalClose').addEventListener('click', closeModal);
      document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target===e.currentTarget) closeModal(); });
      document.addEventListener('keydown', function(e) { if (e.key==='Escape') closeModal(); });
    }

    function setupObs() {
      obs = new IntersectionObserver(function(entries) {
        entries.forEach(function(en) {
          var id = en.target.dataset.animId, a = anims[id]; if (!a) return;
          if (en.isIntersecting) { if (!a.playing) startA(id); } else stopA(id);
        });
      }, { rootMargin: '200px' });
    }

    function apply() {
      filtered = chars.filter(function(c) {
        if (filters.cat!=='all' && c.category!==filters.cat) return false;
        if (filters.src!=='all' && c.source!==filters.src) return false;
        if (filters.q) {
          var q = filters.q;
          if (c.name.toLowerCase().indexOf(q)===-1 && c.category.indexOf(q)===-1 && (c.uuid||'').toLowerCase().indexOf(q)===-1) return false;
        }
        return true;
      });
      render();
    }

    function render() {
      Object.keys(anims).forEach(stopA); anims = {};
      document.getElementById('loadingState').style.display = 'none';
      if (!filtered.length) { document.getElementById('resultsArea').style.display='none'; document.getElementById('emptyState').style.display='block'; return; }
      document.getElementById('emptyState').style.display='none';
      document.getElementById('resultsArea').style.display='block';
      document.getElementById('resultsCount').textContent = filtered.length + ' characters';
      var s = page*SIZE, e = Math.min(s+SIZE, filtered.length), pg = filtered.slice(s,e);
      var grid = document.getElementById('charGrid'), h = '';
      for (var i=0; i<pg.length; i++) {
        var c=pg[i], gi=s+i, aid='a-'+gi;
        var opts=''; for (var j=0;j<c.animations.length;j++) opts+='<option value="'+j+'"'+(j===0?' selected':'')+'>'+esc(c.animations[j].name)+'</option>';
        var dot = c.animations.some(function(x){return x.layout==='horizontal-guess'||x.layout==='unknown';}) ? 'dot-warn' : 'dot-ok';
        h += '<div class="char-card" data-gi="'+gi+'">'+
          '<div class="sprite-viewport" data-anim-id="'+aid+'">'+
            '<canvas id="'+aid+'" width="128" height="128"></canvas>'+
            '<button class="play-pause" data-aid="'+aid+'">&#9646;&#9646;</button>'+
          '</div>'+
          '<div class="char-name"><span class="dot '+dot+'"></span>'+esc(c.name.replace(/[-_]/g,' '))+'</div>'+
          '<div class="char-meta">'+esc(c.category)+' &middot; '+c.animationCount+' anims</div>'+
          '<div class="char-uuid" onclick="copyText(\''+esc(c.uuid)+'\')">'+esc(c.uuid)+'</div>'+
          '<select class="anim-select" data-aid="'+aid+'" data-gi="'+gi+'">'+opts+'</select>'+
          '<div class="frame-info" id="fi-'+aid+'">Loading...</div>'+
        '</div>';
      }
      grid.innerHTML = h;
      for (var i=0;i<pg.length;i++) initA('a-'+(s+i), filtered[s+i], 0);
      grid.querySelectorAll('.anim-select').forEach(function(sel) {
        sel.addEventListener('change', function() { stopA(this.dataset.aid); initA(this.dataset.aid, filtered[+this.dataset.gi], +this.value); });
      });
      grid.querySelectorAll('.play-pause').forEach(function(btn) {
        btn.addEventListener('click', function(ev) { ev.stopPropagation(); var a=anims[this.dataset.aid]; if(!a)return; if(a.playing){stopA(this.dataset.aid);this.innerHTML='&#9654;';}else{startA(this.dataset.aid);this.innerHTML='&#9646;&#9646;';} });
      });
      grid.querySelectorAll('.sprite-viewport').forEach(function(vp) {
        vp.addEventListener('click', function(ev) { if(ev.target.closest('.play-pause'))return; var card=this.closest('.char-card'); if(card)openModal(+card.dataset.gi); });
      });
      renderPag();
    }

    // ─── Canvas animation ───
    function initA(id, ch, ai) {
      var cv = document.getElementById(id); if(!cv) return;
      var ctx = cv.getContext('2d'), ad = ch.animations[ai], img = new Image();
      img.crossOrigin = 'anonymous';
      anims[id] = { img:img, cv:cv, ctx:ctx, f:0, fc:ad.frameCount||1, fw:ad.frameW||128, fh:ad.frameH||128, playing:false, raf:null, fps:8, lt:0, layout:ad.layout||'horizontal' };
      img.onload = function() {
        var a = anims[id]; if(!a) return;
        cv.width = a.fw; cv.height = a.fh;
        var fi = document.getElementById('fi-'+id);
        if(fi) fi.textContent = a.fc+' frames \u00b7 '+a.fw+'x'+a.fh;
        ctx.imageSmoothingEnabled = false;
        drawF(a, 0);
        var vp = cv.parentElement; if(vp) obs.observe(vp);
      };
      img.onerror = function() {
        if (!img.dataset.retry) {
          img.dataset.retry = '1';
          // Try alternate path (flat structure)
          var alt = ad.path.replace(/\/sprites\/(characters|enemies|bosses|monsters|npcs|companions|fish)\//, '/sprites/');
          img.src = BASE + alt;
        } else {
          var fi = document.getElementById('fi-'+id);
          if(fi) fi.textContent = 'Failed';
          ctx.clearRect(0,0,cv.width,cv.height); ctx.fillStyle='#ff4d4d'; ctx.font='12px sans-serif'; ctx.textAlign='center';
          ctx.fillText('\u274C',cv.width/2,cv.height/2);
        }
      };
      img.src = BASE + ad.path;
    }

    function drawF(a, f) {
      a.ctx.clearRect(0,0,a.fw,a.fh); a.ctx.imageSmoothingEnabled=false;
      if (a.layout==='vertical') a.ctx.drawImage(a.img, 0, f*a.fh, a.fw, a.fh, 0, 0, a.fw, a.fh);
      else a.ctx.drawImage(a.img, f*a.fw, 0, a.fw, a.fh, 0, 0, a.fw, a.fh);
    }

    function startA(id) {
      var a=anims[id]; if(!a||a.playing||a.fc<=1) return;
      a.playing=true; a.lt=performance.now();
      function tick(now) { if(!a.playing)return; if(now-a.lt>=1000/a.fps){a.f=(a.f+1)%a.fc;a.lt=now;drawF(a,a.f);} a.raf=requestAnimationFrame(tick); }
      a.raf=requestAnimationFrame(tick);
    }
    function stopA(id) { var a=anims[id]; if(!a)return; a.playing=false; if(a.raf){cancelAnimationFrame(a.raf);a.raf=null;} }

    // ─── Modal ───
    var mA = null, mGrid = false;

    function openModal(gi) {
      var c = filtered[gi]; if(!c) return;
      var h = '<div class="modal-preview" id="mPrev"><canvas id="mCv" width="256" height="256"></canvas></div>'+
        '<div class="modal-title">'+esc(c.name.replace(/[-_]/g,' '))+'</div>'+
        '<div class="modal-uuid" onclick="copyText(\''+esc(c.uuid)+'\')">'+esc(c.uuid)+'</div>'+
        '<div class="char-meta">'+esc(c.category)+' &middot; '+esc(c.source)+' &middot; '+c.animationCount+' animations</div>'+
        '<div class="modal-anim-row" id="mBtns"></div>'+
        '<div class="modal-controls">'+
          '<label>FPS <input type="range" id="mFps" min="1" max="30" value="8"><span id="mFpsV">8</span></label>'+
          '<label>Frame <input type="range" id="mScrub" min="0" max="1" value="0"><span id="mScrubV">0</span></label>'+
          '<button id="mGridBtn">Grid</button>'+
          '<button id="mSheetBtn">Sheet</button>'+
          '<button id="mExportBtn">Export</button>'+
          '<label>Zoom <input type="range" id="mZoom" min="1" max="5" value="2" step="0.5"><span id="mZoomV">2x</span></label>'+
        '</div>'+
        '<div class="modal-info" id="mInfo"></div>'+
        '<div class="modal-path" id="mPath" onclick="copyText(this.textContent)"></div>';
      document.getElementById('modalBody').innerHTML = h;
      var btns = ''; c.animations.forEach(function(a,i) { btns += '<button class="modal-anim-btn'+(i===0?' active':'')+'" data-i="'+i+'">'+esc(a.name)+'</button>'; });
      document.getElementById('mBtns').innerHTML = btns;
      loadMA(c, 0);
      document.getElementById('mBtns').addEventListener('click', function(e) {
        var b=e.target.closest('[data-i]'); if(!b) return;
        this.querySelectorAll('[data-i]').forEach(function(x){x.classList.remove('active');}); b.classList.add('active');
        loadMA(c, +b.dataset.i);
      });
      document.getElementById('mFps').addEventListener('input', function() { if(mA)mA.fps=+this.value; document.getElementById('mFpsV').textContent=this.value; });
      document.getElementById('mScrub').addEventListener('input', function() { if(!mA)return; mA.f=+this.value; document.getElementById('mScrubV').textContent=this.value; if(!mA.playing) drawMF(mA.f); });
      document.getElementById('mGridBtn').addEventListener('click', function() { mGrid=!mGrid; this.classList.toggle('active',mGrid); if(mA&&!mA.playing) drawMF(mA.f); });
      document.getElementById('mSheetBtn').addEventListener('click', showSheet);
      document.getElementById('mExportBtn').addEventListener('click', exportF);
      document.getElementById('mZoom').addEventListener('input', function() { document.getElementById('mZoomV').textContent=this.value+'x'; if(mA){document.getElementById('mCv').style.width=(mA.fw*+this.value)+'px';} });
      document.getElementById('modalOverlay').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function loadMA(ch, ai) {
      if (mA&&mA.raf) cancelAnimationFrame(mA.raf);
      var cv=document.getElementById('mCv'); if(!cv) return;
      var ctx=cv.getContext('2d'), ad=ch.animations[ai], img=new Image();
      img.crossOrigin='anonymous';
      mA = { img:img, cv:cv, ctx:ctx, f:0, fc:1, fw:256, fh:256, raf:null, fps:+(document.getElementById('mFps').value)||8, lt:0, layout:'horizontal', ad:ad };
      img.onload = function() {
        mA.fc=ad.frameCount||1; mA.fw=ad.frameW||img.naturalWidth; mA.fh=ad.frameH||img.naturalHeight; mA.layout=ad.layout||'horizontal';
        cv.width=mA.fw; cv.height=mA.fh;
        var z=+(document.getElementById('mZoom').value)||2; cv.style.width=(mA.fw*z)+'px';
        var sc=document.getElementById('mScrub'); sc.max=Math.max(0,mA.fc-1); sc.value=0; document.getElementById('mScrubV').textContent='0';
        var ll = mA.layout==='vertical'?'Vertical':mA.layout==='horizontal'?'Horizontal':mA.layout==='single'?'Single':mA.layout;
        var sd = (ad.layout==='horizontal-guess'||ad.layout==='unknown') ? '<span class="dot dot-warn"></span>' : '<span class="dot dot-ok"></span>';
        document.getElementById('mInfo').innerHTML =
          '<div class="modal-info-item"><div class="modal-info-label">Animation</div><div class="modal-info-value">'+esc(ad.name)+'</div></div>'+
          '<div class="modal-info-item"><div class="modal-info-label">UUID</div><div class="modal-info-value" style="font-size:0.6rem;cursor:pointer;" onclick="copyText(\''+esc(ad.uuid)+'\')">'+esc(ad.uuid)+'</div></div>'+
          '<div class="modal-info-item"><div class="modal-info-label">Frames</div><div class="modal-info-value">'+mA.fc+'</div></div>'+
          '<div class="modal-info-item"><div class="modal-info-label">Frame Size</div><div class="modal-info-value">'+mA.fw+'x'+mA.fh+'</div></div>'+
          '<div class="modal-info-item"><div class="modal-info-label">Sheet</div><div class="modal-info-value">'+ad.width+'x'+ad.height+'</div></div>'+
          '<div class="modal-info-item"><div class="modal-info-label">Layout</div><div class="modal-info-value">'+sd+ll+'</div></div>';
        document.getElementById('mPath').textContent = ad.path;
        drawMF(0);
        if (mA.fc>1) { mA.playing=true; mA.lt=performance.now(); function tick(now){if(!mA||!mA.playing)return;if(now-mA.lt>=1000/mA.fps){mA.f=(mA.f+1)%mA.fc;mA.lt=now;drawMF(mA.f);document.getElementById('mScrub').value=mA.f;document.getElementById('mScrubV').textContent=mA.f;}mA.raf=requestAnimationFrame(tick);}mA.raf=requestAnimationFrame(tick); }
      };
      img.onerror = function() { ctx.clearRect(0,0,cv.width,cv.height); ctx.fillStyle='#ff4d4d'; ctx.font='18px sans-serif'; ctx.textAlign='center'; ctx.fillText('\u274C Load failed',cv.width/2,cv.height/2); };
      img.src = BASE + ad.path;
    }

    function drawMF(f) {
      if(!mA) return; var ctx=mA.ctx, fw=mA.fw, fh=mA.fh;
      ctx.clearRect(0,0,fw,fh); ctx.imageSmoothingEnabled=false;
      if(mA.layout==='vertical') ctx.drawImage(mA.img, 0, f*fh, fw, fh, 0, 0, fw, fh);
      else ctx.drawImage(mA.img, f*fw, 0, fw, fh, 0, 0, fw, fh);
      if (mGrid) { ctx.strokeStyle='rgba(212,168,75,0.5)'; ctx.lineWidth=1; ctx.strokeRect(.5,.5,fw-1,fh-1); ctx.setLineDash([4,4]); ctx.beginPath();ctx.moveTo(fw/2,0);ctx.lineTo(fw/2,fh);ctx.stroke(); ctx.beginPath();ctx.moveTo(0,fh/2);ctx.lineTo(fw,fh/2);ctx.stroke(); ctx.setLineDash([]); }
    }

    function showSheet() {
      if(!mA||!mA.img.complete) return;
      var cv=document.getElementById('mCv'), ctx=cv.getContext('2d'), img=mA.img;
      cv.width=img.naturalWidth; cv.height=img.naturalHeight;
      var z=+(document.getElementById('mZoom').value)||2; cv.style.width=(img.naturalWidth*z)+'px';
      ctx.imageSmoothingEnabled=false; ctx.drawImage(img,0,0);
      ctx.strokeStyle='rgba(212,168,75,0.4)'; ctx.lineWidth=1;
      for(var i=1;i<mA.fc;i++){if(mA.layout==='vertical'){var y=i*mA.fh;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(img.naturalWidth,y);ctx.stroke();}else{var x=i*mA.fw;ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,img.naturalHeight);ctx.stroke();}}
      if(mA.raf){cancelAnimationFrame(mA.raf);mA.raf=null;mA.playing=false;}
    }

    function exportF() {
      if(!mA||!mA.img.complete) return;
      var ec=document.createElement('canvas'); ec.width=mA.fw; ec.height=mA.fh;
      var ctx=ec.getContext('2d'); ctx.imageSmoothingEnabled=false;
      if(mA.layout==='vertical') ctx.drawImage(mA.img, 0, mA.f*mA.fh, mA.fw, mA.fh, 0, 0, mA.fw, mA.fh);
      else ctx.drawImage(mA.img, mA.f*mA.fw, 0, mA.fw, mA.fh, 0, 0, mA.fw, mA.fh);
      var link=document.createElement('a'); link.download=(mA.ad.id||'frame')+'_'+mA.f+'.png'; link.href=ec.toDataURL('image/png'); link.click();
    }

    function closeModal() { if(mA){if(mA.raf)cancelAnimationFrame(mA.raf);mA=null;} document.getElementById('modalOverlay').classList.remove('active'); document.body.style.overflow=''; }

    function renderPag() {
      var t=Math.ceil(filtered.length/SIZE); if(t<=1){document.getElementById('pagination').innerHTML='';return;}
      var h='<button class="page-btn" onclick="goPage(0)" '+(page===0?'disabled':'')+'>&laquo;</button>';
      h+='<button class="page-btn" onclick="goPage('+(page-1)+')" '+(page===0?'disabled':'')+'>&lsaquo;</button>';
      var s=Math.max(0,page-3),e=Math.min(t,s+7);
      for(var p=s;p<e;p++) h+='<button class="page-btn '+(p===page?'active':'')+'" onclick="goPage('+p+')">'+(p+1)+'</button>';
      h+='<button class="page-btn" onclick="goPage('+(page+1)+')" '+(page>=t-1?'disabled':'')+'>&rsaquo;</button>';
      h+='<button class="page-btn" onclick="goPage('+(t-1)+')" '+(page>=t-1?'disabled':'')+'>&raquo;</button>';
      document.getElementById('pagination').innerHTML = h;
    }

    window.goPage = function(p) { var t=Math.ceil(filtered.length/SIZE); if(p<0||p>=t)return; page=p; render(); window.scrollTo({top:document.getElementById('resultsArea').offsetTop-20,behavior:'smooth'}); };
    window.copyText = function(txt) { navigator.clipboard.writeText(txt).then(function() { var t=document.getElementById('copyToast'); t.style.display='block'; setTimeout(function(){t.style.display='none';},1200); }); };
    function esc(s) { return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'):''; }

    init();
  })();
  </script>
</body>
</html>
