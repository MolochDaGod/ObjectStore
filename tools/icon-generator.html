<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRUDGE Icon Generator - Puter AI</title>
  <script src="https://js.puter.com/v2/"></script>
  <style>
    :root { --bg: #0f0f0f; --surface: #1a1a2e; --border: #333; --gold: #f59e0b; --text: #e2e8f0; --text-dim: #94a3b8; --accent: #6366f1; --success: #22c55e; --error: #ef4444; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }
    h1 { color: var(--gold); margin-bottom: 8px; }
    .subtitle { color: var(--text-dim); margin-bottom: 24px; }
    .controls { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
    select, button, input { padding: 8px 16px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--text); font-size: 14px; }
    button { cursor: pointer; background: var(--accent); border-color: var(--accent); font-weight: 600; }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.danger { background: var(--error); border-color: var(--error); }
    .status { padding: 12px; border-radius: 8px; background: var(--surface); border: 1px solid var(--border); margin-bottom: 20px; }
    .status .progress { color: var(--gold); font-weight: 600; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: center; }
    .card img { width: 128px; height: 128px; object-fit: contain; border-radius: 8px; margin: 8px 0; background: #222; }
    .card .placeholder { width: 128px; height: 128px; margin: 8px auto; background: #222; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 48px; }
    .card .name { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
    .card .meta { color: var(--text-dim); font-size: 11px; }
    .card .actions { margin-top: 8px; display: flex; gap: 6px; justify-content: center; }
    .card .actions button { font-size: 12px; padding: 4px 10px; }
    .card.generated { border-color: var(--success); }
    .card.generating { border-color: var(--gold); animation: pulse 1.5s infinite; }
    .card.failed { border-color: var(--error); }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
    .log { max-height: 200px; overflow-y: auto; background: #111; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 12px; margin-top: 20px; }
    .log .entry { padding: 2px 0; }
    .log .success { color: var(--success); }
    .log .error { color: var(--error); }
    .log .info { color: var(--text-dim); }
    .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
    .tabs button { background: var(--surface); border-color: var(--border); }
    .tabs button.active { background: var(--accent); border-color: var(--accent); }
  </style>
</head>
<body>
  <h1>⚔️ GRUDGE Icon Generator</h1>
  <p class="subtitle">Generate game asset icons using Puter's free AI (FLUX model). Icons save to Puter cloud storage.</p>

  <div class="controls">
    <select id="categorySelect">
      <option value="armor-cloth">🧥 Cloth Armor</option>
      <option value="armor-leather">🦺 Leather Armor</option>
      <option value="armor-metal">⛑️ Metal Armor</option>
      <option value="armor-gem">💎 Gem Offhands</option>
      <option value="consumables-engineer">🔧 Engineer Consumables</option>
      <option value="consumables-potions">🧪 Mystic Potions</option>
    </select>
    <select id="styleSelect">
      <option value="pixel">Pixel Art (64x64)</option>
      <option value="painted">Hand-Painted</option>
      <option value="flat">Flat Vector</option>
    </select>
    <button onclick="loadCategory()">Load Items</button>
    <button onclick="generateAll()" id="batchBtn" disabled>Generate All Missing</button>
    <button onclick="stopGeneration()" class="danger" id="stopBtn" disabled>Stop</button>
  </div>

  <div class="status" id="status">
    <span class="progress" id="progressText">Select a category and click Load Items</span>
  </div>

  <div class="grid" id="itemGrid"></div>

  <div class="log" id="log"></div>

  <script>
    const API_BASE = '../api/v1';
    let allItems = [];
    let generating = false;
    let shouldStop = false;

    const STYLE_PROMPTS = {
      pixel: '2D game sprite, pixel art style, 64x64 icon, fantasy RPG item, clean bold dark outline, centered, floating item, NO BACKGROUND COLOR, pure transparent background only, single object, no shadows, no ground, no scenery',
      painted: 'hand-painted fantasy game art, detailed textures, soft lighting, game icon style, transparent background, centered item',
      flat: 'flat vector icon style, clean lines, solid colors, game UI icon, transparent background, minimalist, centered',
    };

    const CATEGORY_PROMPTS = {
      helm: 'fantasy RPG helmet headpiece, armor piece',
      shoulder: 'fantasy RPG shoulder pauldron armor piece',
      chest: 'fantasy RPG chestplate body armor',
      hands: 'fantasy RPG gauntlets gloves armor piece',
      feet: 'fantasy RPG boots footwear armor piece',
      ring: 'fantasy RPG magical ring, jewelry, game inventory icon',
      necklace: 'fantasy RPG necklace pendant amulet, jewelry',
      relic: 'fantasy RPG magical relic artifact trinket',
      offhand: 'fantasy RPG glowing magical gem orb, caster offhand',
      bandage: 'medical bandage wrap, first aid item, game inventory icon',
      grenade: 'fantasy engineering grenade explosive device',
      gadget: 'fantasy engineering gadget mechanical device',
      potion: 'fantasy RPG potion bottle, magical elixir, colorful liquid',
      lure: 'fishing lure bait hook, game inventory icon',
    };

    const MATERIAL_HINTS = {
      Cloth: 'cloth fabric magical robes wizard',
      Leather: 'leather hide ranger rogue agile',
      Metal: 'plate steel heavy knight warrior tank',
      Gem: 'crystalline glowing magical gem arcane',
    };

    function buildPrompt(item, style) {
      const slotKey = item.type?.toLowerCase() || 'helm';
      const categoryPrompt = CATEGORY_PROMPTS[slotKey] || 'fantasy RPG equipment item';
      const materialHint = MATERIAL_HINTS[item.material] || '';
      const stylePrompt = STYLE_PROMPTS[style] || STYLE_PROMPTS.pixel;
      return `${item.name}, ${categoryPrompt}, ${materialHint}, ${stylePrompt}, high quality, game asset`;
    }

    function log(msg, type = 'info') {
      const el = document.getElementById('log');
      const entry = document.createElement('div');
      entry.className = `entry ${type}`;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      el.prepend(entry);
    }

    async function loadCategory() {
      const cat = document.getElementById('categorySelect').value;
      const [type, subtype] = cat.split('-');
      allItems = [];

      try {
        if (type === 'armor') {
          const data = await fetch(`${API_BASE}/armor.json`).then(r => r.json());
          const materialItems = data.materials[subtype]?.items || [];
          allItems = materialItems.map(item => ({
            ...item,
            category: `armor-${subtype}`,
            iconId: item.id,
          }));
        } else if (type === 'consumables') {
          const data = await fetch(`${API_BASE}/consumables.json`).then(r => r.json());
          if (subtype === 'engineer') {
            allItems = (data.categories.engineerConsumables?.items || []).map(item => ({
              ...item, material: 'Engineering', type: getEngineerType(item.name),
              category: 'consumables-engineer', iconId: `engineer-${item.id}`,
            }));
          } else if (subtype === 'potions') {
            const potions = (data.categories.mysticPotions?.items || []).filter(p => {
              const n = p.name.toLowerCase();
              return !n.includes('health') && !n.includes('mana') && !n.includes('heal');
            });
            allItems = potions.map(item => ({
              ...item, material: 'Mystic', type: 'potion',
              category: 'consumables-potions', iconId: `potion-${item.id}`,
            }));
          }
        }

        renderGrid();
        document.getElementById('batchBtn').disabled = allItems.length === 0;
        document.getElementById('progressText').textContent = `Loaded ${allItems.length} items from ${cat}`;
        log(`Loaded ${allItems.length} items from ${cat}`, 'success');
      } catch (err) {
        log(`Failed to load: ${err.message}`, 'error');
      }
    }

    function getEngineerType(name) {
      const n = name.toLowerCase();
      if (n.includes('bandage') || n.includes('medkit')) return 'bandage';
      if (n.includes('grenade') || n.includes('flashbang') || n.includes('emp')) return 'grenade';
      if (n.includes('lure')) return 'lure';
      return 'gadget';
    }

    function renderGrid() {
      const grid = document.getElementById('itemGrid');
      grid.innerHTML = '';
      for (const item of allItems) {
        const card = document.createElement('div');
        card.className = 'card';
        card.id = `card-${item.iconId}`;
        card.innerHTML = `
          <div class="placeholder" id="icon-${item.iconId}">${item.emoji || '🛡️'}</div>
          <div class="name">${item.name}</div>
          <div class="meta">${item.material || ''} ${item.type || ''}</div>
          <div class="actions">
            <button onclick="generateOne('${item.iconId}')">Generate</button>
            <button onclick="downloadIcon('${item.iconId}')" id="dl-${item.iconId}" disabled>Download</button>
          </div>
        `;
        grid.appendChild(card);
      }
    }

    async function generateOne(iconId) {
      const item = allItems.find(i => i.iconId === iconId);
      if (!item) return;
      const style = document.getElementById('styleSelect').value;
      const prompt = buildPrompt(item, style);

      const card = document.getElementById(`card-${iconId}`);
      card.className = 'card generating';
      log(`Generating: ${item.name}...`, 'info');

      try {
        const img = await puter.ai.txt2img(prompt);

        // Display the generated image
        const iconEl = document.getElementById(`icon-${iconId}`);
        if (img instanceof HTMLImageElement) {
          img.style.width = '128px';
          img.style.height = '128px';
          img.style.objectFit = 'contain';
          iconEl.replaceWith(img);
          img.id = `icon-${iconId}`;
        } else if (img instanceof Blob) {
          const url = URL.createObjectURL(img);
          const imgEl = document.createElement('img');
          imgEl.src = url;
          imgEl.id = `icon-${iconId}`;
          iconEl.replaceWith(imgEl);
        }

        // Save to Puter cloud
        try {
          const blob = img instanceof Blob ? img : await imageToBlob(img);
          const cloudPath = `/grudge-warlords/sprites/${item.category}/${iconId}.png`;
          await puter.fs.write(cloudPath, blob, { createMissingParents: true });
          log(`Saved: ${cloudPath}`, 'success');
        } catch (saveErr) {
          log(`Generated but failed to save: ${saveErr.message}`, 'error');
        }

        card.className = 'card generated';
        document.getElementById(`dl-${iconId}`).disabled = false;
        log(`Generated: ${item.name}`, 'success');
        return true;
      } catch (err) {
        card.className = 'card failed';
        log(`Failed: ${item.name} - ${err.message}`, 'error');
        return false;
      }
    }

    async function imageToBlob(img) {
      const canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth || img.width || 512;
      canvas.height = img.naturalHeight || img.height || 512;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      return new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
    }

    async function generateAll() {
      generating = true;
      shouldStop = false;
      document.getElementById('batchBtn').disabled = true;
      document.getElementById('stopBtn').disabled = false;

      const ungenerated = allItems.filter(i => {
        const card = document.getElementById(`card-${i.iconId}`);
        return card && !card.classList.contains('generated');
      });

      log(`Starting batch: ${ungenerated.length} items`, 'info');

      for (let i = 0; i < ungenerated.length; i++) {
        if (shouldStop) {
          log('Generation stopped by user', 'error');
          break;
        }

        const item = ungenerated[i];
        document.getElementById('progressText').textContent = `Generating ${i + 1}/${ungenerated.length}: ${item.name}`;
        await generateOne(item.iconId);

        // Rate limit: 2.5s between calls
        if (i < ungenerated.length - 1 && !shouldStop) {
          await new Promise(r => setTimeout(r, 2500));
        }
      }

      generating = false;
      document.getElementById('batchBtn').disabled = false;
      document.getElementById('stopBtn').disabled = true;
      document.getElementById('progressText').textContent = 'Batch complete!';
    }

    function stopGeneration() {
      shouldStop = true;
    }

    function downloadIcon(iconId) {
      const img = document.getElementById(`icon-${iconId}`);
      if (!img || !img.src) return;

      const a = document.createElement('a');
      a.href = img.src;
      a.download = `${iconId}.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    log('Ready. Select a category and click Load Items.', 'info');
  </script>
</body>
</html>
