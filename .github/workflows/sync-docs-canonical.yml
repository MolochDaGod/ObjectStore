name: Sync Canonical Docs

on:
  push:
    branches: [main]
    paths:
      - 'api/v1/**'
      - 'scripts/sync-docs-canonical.mjs'
      - 'docs/index.html'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate /docs from canonical api/v1
        run: node scripts/sync-docs-canonical.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/canonical-manifest.json
          if git diff --staged --quiet; then
            echo "Docs already in sync."
            exit 0
          fi
          git commit -m "chore(docs): sync canonical manifest from api/v1 [skip ci]"
          git push