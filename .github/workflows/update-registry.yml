name: Update Registries & Thumbnails

on:
  push:
    branches: [main]
    paths:
      - 'sprites/**'
      - 'icons/**'
      - 'backgrounds/**'
      - 'images/**'
      - 'map_nodes/**'
      - 'api/v1/**'

  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install sharp

      - name: Regenerate sprites2d.json
        run: node scripts/organize-rpg-modular.mjs --registry-only 2>/dev/null || true

      - name: Regenerate asset registry
        run: node scripts/generate-asset-registry.mjs 2>/dev/null || true

      - name: Validate JSON schemas
        run: node scripts/validate-schemas.mjs 2>/dev/null || true

      - name: Generate changelog
        run: node scripts/generate-changelog.mjs 2>/dev/null || true

      - name: Sync canonical docs (/docs)
        run: node scripts/sync-docs-canonical.mjs

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: auto-update registries and thumbnails

          Co-Authored-By: Oz <oz-agent@warp.dev>"
          git push
