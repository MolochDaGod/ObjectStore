name: Sync Assets to R2 (Self-Hosted)

on:
  workflow_dispatch:
    inputs:
      category:
        description: "Asset category to sync (e.g., 'models', 'audio', 'sprites', or 'all')"
        default: "all"
        required: false
      dry_run:
        description: "Preview only, don't upload"
        type: boolean
        default: false

# Runs on local Windows machine (D:\actions-runner)
# Has direct access to local asset files and R2 credentials
jobs:
  sync:
    runs-on: self-hosted
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check R2 connectivity
        run: |
          $health = Invoke-WebRequest -Uri "https://objectstore.grudge-studio.com/health" -UseBasicParsing -TimeoutSec 10
          Write-Output "R2 Worker: $($health.StatusCode)"
          $health2 = Invoke-WebRequest -Uri "https://grudgeassets.grudge.workers.dev/health" -UseBasicParsing -TimeoutSec 10
          Write-Output "Workers.dev: $($health2.StatusCode)"
        shell: pwsh

      - name: Count assets in R2
        run: |
          $res = Invoke-WebRequest -Uri "https://grudgeassets.grudge.workers.dev/v1/assets?limit=1" -UseBasicParsing
          $data = $res.Content | ConvertFrom-Json
          Write-Output "R2 total assets: $($data.count)"
          $models = Invoke-WebRequest -Uri "https://grudgeassets.grudge.workers.dev/v1/models?limit=1" -UseBasicParsing
          $mdata = $models.Content | ConvertFrom-Json
          Write-Output "R2 3D models: $($mdata.total)"
        shell: pwsh

      - name: Deploy Cloudflare Worker
        if: inputs.category == 'all' || inputs.category == 'worker'
        run: npx wrangler deploy --config wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

      - name: Deploy AI Hub Worker
        if: inputs.category == 'all' || inputs.category == 'worker'
        run: npx wrangler deploy --config workers/ai/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

      - name: Summary
        run: |
          Write-Output "=== Sync Complete ==="
          Write-Output "Category: ${{ inputs.category }}"
          Write-Output "Dry run: ${{ inputs.dry_run }}"
          Write-Output "Runner: $env:COMPUTERNAME"
        shell: pwsh
