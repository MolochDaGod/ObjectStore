<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRUDGE Item Database — ObjectStore</title>
  <meta name="description" content="Complete catalog of Grudge Warlords items — weapons, armor, relics, enchants, infusions, materials and more.">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Spectral+SC:ital,wght@0,400;0,600;1,400&family=Uncial+Antiqua&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: hsl(43 85% 55%);
      --gold-light: hsl(43 90% 70%);
      --gold-dark: hsl(43 70% 35%);
      --gold-dim: hsla(43,85%,55%,0.12);
      --bg: hsl(225 32% 6%);
      --bg-mid: hsl(225 28% 10%);
      --bg-card: hsl(225 25% 13%);
      --bg-card-hover: hsl(225 25% 17%);
      --border: hsl(225 20% 18%);
      --border-gold: hsl(43 50% 28%);
      --border-gold-hover: hsl(43 60% 42%);
      --text: hsl(45 25% 88%);
      --text-muted: hsl(45 12% 55%);
      --text-dim: hsl(45 8% 38%);
      --sidebar-w: 230px;
      --radius: 10px;
      --radius-sm: 6px;
      --transition: 0.18s ease;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{font-family:'Spectral SC',Georgia,serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

    /* Header */
    .site-header{background:linear-gradient(180deg,hsl(225 28% 13%) 0%,hsl(225 30% 8%) 100%);border-bottom:1px solid var(--border-gold);padding:18px 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;box-shadow:0 4px 24px rgba(0,0,0,0.5);}
    .site-header img{height:36px;width:36px;object-fit:contain;}
    .site-header h1{font-family:'Cinzel Decorative',serif;font-size:1.4rem;font-weight:900;background:linear-gradient(135deg,var(--gold-light),var(--gold),var(--gold-dark));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap;}
    .header-sub{font-family:'Uncial Antiqua',serif;font-size:0.75rem;color:var(--text-muted);letter-spacing:0.06em;margin-left:auto;white-space:nowrap;}
    .header-counts{display:flex;gap:10px;margin-left:12px;}
    .hcount{text-align:center;background:var(--gold-dim);border:1px solid var(--border-gold);border-radius:var(--radius-sm);padding:3px 10px;font-family:'Cinzel',serif;font-size:0.7rem;}
    .hcount strong{display:block;color:var(--gold);font-size:0.95rem;line-height:1.2;}

    /* Layout */
    .layout{display:flex;height:calc(100vh - 73px);overflow:hidden;}

    /* Sidebar */
    .sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--bg-mid);border-right:1px solid var(--border);overflow-y:auto;padding:12px 0;}
    .sidebar::-webkit-scrollbar{width:4px;}
    .sidebar::-webkit-scrollbar-thumb{background:var(--border-gold);border-radius:4px;}
    .sidebar-label{font-family:'Cinzel',serif;font-size:0.63rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-dim);padding:10px 16px 5px;}
    .nav-btn{display:flex;align-items:center;gap:9px;width:100%;padding:8px 16px;background:none;border:none;border-left:3px solid transparent;color:var(--text-muted);font-family:'Spectral SC',serif;font-size:0.83rem;cursor:pointer;transition:all var(--transition);text-align:left;}
    .nav-btn:hover{background:var(--bg-card);color:var(--text);}
    .nav-btn.active{border-left-color:var(--gold);color:var(--gold);background:var(--gold-dim);}
    .nav-btn .badge{margin-left:auto;font-size:0.68rem;color:var(--text-dim);background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:1px 6px;font-family:'Cinzel',serif;}
    .nav-btn .ico{font-size:0.95rem;width:18px;text-align:center;}
    .sidebar-divider{height:1px;background:var(--border);margin:8px 0;}
    .tier-filters{padding:0 10px 0;}
    .tier-row{display:flex;flex-wrap:wrap;gap:5px;}
    .tier-btn{padding:4px 9px;border-radius:var(--radius-sm);border:1px solid var(--border);background:none;color:var(--text-muted);font-family:'Cinzel',serif;font-size:0.7rem;cursor:pointer;transition:all var(--transition);}
    .tier-btn:hover{border-color:var(--gold);color:var(--gold);}
    .tier-btn.active{background:var(--gold);color:#0a0e14;border-color:var(--gold);}

    /* Main */
    .main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
    .toolbar{padding:12px 18px;background:var(--bg-mid);border-bottom:1px solid var(--border);display:flex;gap:9px;align-items:center;}
    .search-wrap{flex:1;position:relative;}
    .search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-dim);pointer-events:none;}
    #searchBox{width:100%;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px 8px 34px;color:var(--text);font-family:'Spectral SC',serif;font-size:0.86rem;outline:none;transition:border-color var(--transition);}
    #searchBox:focus{border-color:var(--gold);}
    #searchBox::placeholder{color:var(--text-dim);}
    .sort-select{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-muted);font-family:'Spectral SC',serif;font-size:0.8rem;padding:7px 11px;outline:none;cursor:pointer;}
    .result-info{font-family:'Cinzel',serif;font-size:0.7rem;color:var(--text-dim);white-space:nowrap;}

    /* Grid */
    .grid-wrap{flex:1;overflow-y:auto;padding:14px 18px;}
    .grid-wrap::-webkit-scrollbar{width:6px;}
    .grid-wrap::-webkit-scrollbar-thumb{background:var(--border-gold);border-radius:4px;}
    .items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:11px;}

    /* Card */
    .item-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:11px;cursor:pointer;transition:all var(--transition);position:relative;display:flex;flex-direction:column;gap:7px;animation:fadeUp 0.22s ease both;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:none;}}
    .item-card:hover{background:var(--bg-card-hover);border-color:var(--border-gold-hover);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.4);}
    .item-card.active{border-color:var(--gold);background:var(--bg-card-hover);}
    .tier-stripe{position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius) var(--radius) 0 0;}
    .item-icon-wrap{width:60px;height:60px;margin:3px auto 0;background:var(--bg);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;}
    .item-icon-wrap img{width:100%;height:100%;object-fit:contain;}
    .item-icon-fallback{font-size:1.8rem;line-height:1;}
    .item-name{font-family:'Cinzel',serif;font-size:0.75rem;font-weight:600;color:var(--text);text-align:center;line-height:1.3;}
    .item-meta{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;}
    .tag{font-family:'Cinzel',serif;font-size:0.6rem;text-transform:uppercase;letter-spacing:0.04em;padding:2px 6px;border-radius:10px;border:1px solid;}
    .tag-tier{background:transparent;}
    .tag-cat{background:var(--bg);border-color:var(--border);color:var(--text-dim);}

    /* Load More */
    .load-more-wrap{text-align:center;padding:18px;}
    .load-more-btn{background:var(--gold-dim);border:1px solid var(--border-gold);color:var(--gold);font-family:'Cinzel',serif;font-size:0.83rem;padding:9px 26px;border-radius:var(--radius-sm);cursor:pointer;transition:all var(--transition);}
    .load-more-btn:hover{background:var(--gold);color:#0a0e14;}

    /* States */
    .state-message{text-align:center;padding:60px 20px;color:var(--text-dim);}
    .state-message .big{font-size:2.5rem;margin-bottom:12px;}
    .state-message p{font-family:'Cinzel',serif;font-size:0.83rem;}
    .loading-orb{display:inline-block;width:12px;height:12px;border:2px solid var(--border-gold);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin-right:6px;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* Detail Drawer */
    .detail-drawer{width:320px;flex-shrink:0;background:var(--bg-mid);border-left:1px solid var(--border-gold);overflow-y:auto;display:none;flex-direction:column;}
    .detail-drawer.open{display:flex;}
    .detail-drawer::-webkit-scrollbar{width:4px;}
    .detail-drawer::-webkit-scrollbar-thumb{background:var(--border-gold);border-radius:4px;}
    .drawer-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;position:sticky;top:0;background:var(--bg-mid);z-index:10;}
    .drawer-close{margin-left:auto;background:none;border:1px solid var(--border);color:var(--text-muted);width:26px;height:26px;border-radius:6px;cursor:pointer;font-size:0.9rem;display:flex;align-items:center;justify-content:center;transition:all var(--transition);}
    .drawer-close:hover{border-color:var(--gold);color:var(--gold);}
    .drawer-icon{width:72px;height:72px;background:var(--bg);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;overflow:hidden;margin:14px auto 0;border:1px solid var(--border-gold);}
    .drawer-icon img{width:100%;height:100%;object-fit:contain;}
    .drawer-icon-fb{font-size:2.5rem;}
    .drawer-body{padding:0 14px 22px;}
    .drawer-name{font-family:'Cinzel Decorative',serif;font-size:1rem;font-weight:700;color:var(--gold-light);text-align:center;margin:10px 0 5px;line-height:1.3;}
    .drawer-tier{text-align:center;margin-bottom:10px;}
    .drawer-tier span{font-family:'Cinzel',serif;font-size:0.73rem;padding:2px 11px;border-radius:10px;border:1px solid;}
    .drawer-desc{font-size:0.82rem;color:var(--text-muted);font-style:italic;line-height:1.6;margin-bottom:10px;text-align:center;}
    .drawer-section-title{font-family:'Cinzel',serif;font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-dim);margin:14px 0 7px;display:flex;align-items:center;gap:7px;}
    .drawer-section-title::after{content:'';flex:1;height:1px;background:var(--border);}
    .stat-row{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
    .stat-key{font-family:'Cinzel',serif;font-size:0.68rem;color:var(--text-muted);width:68px;flex-shrink:0;text-transform:capitalize;}
    .stat-bar-wrap{flex:1;height:4px;background:var(--bg);border-radius:3px;overflow:hidden;}
    .stat-bar{height:100%;border-radius:3px;transition:width 0.5s ease;}
    .stat-val{font-family:'Cinzel',serif;font-size:0.72rem;color:var(--gold);width:28px;text-align:right;}
    .ability-list{display:flex;flex-direction:column;gap:4px;}
    .ability-item{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 9px;font-size:0.76rem;color:var(--text-muted);line-height:1.4;}
    .ability-item.signature{border-color:var(--gold-dark);color:var(--gold-light);background:var(--gold-dim);}
    .detail-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px;}
    .detail-tag{font-family:'Cinzel',serif;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.05em;padding:2px 8px;border-radius:10px;background:var(--bg-card);border:1px solid var(--border);color:var(--text-muted);}

    /* Responsive */
    @media(max-width:768px){
      .site-header h1{font-size:1.05rem;}
      .header-counts,.header-sub{display:none;}
      .layout{flex-direction:column;height:auto;}
      .sidebar{width:100%;height:auto;flex-direction:row;overflow-x:auto;overflow-y:hidden;padding:7px;border-right:none;border-bottom:1px solid var(--border);}
      .sidebar-label,.sidebar-divider,.tier-filters{display:none;}
      .nav-btn{white-space:nowrap;padding:6px 13px;border-left:none;border-bottom:3px solid transparent;flex-shrink:0;}
      .nav-btn.active{border-left:none;border-bottom-color:var(--gold);}
      .main{overflow:visible;}
      .grid-wrap{overflow-y:visible;padding:10px;}
      .detail-drawer{width:100%;border-left:none;border-top:1px solid var(--border-gold);}
    }
  </style>
</head>
<body>

<header class="site-header">
  <img src="favicon.svg" alt="Grudge Studio">
  <h1>GRUDGE ITEM DATABASE</h1>
  <span class="header-sub">ObjectStore v3 — Live master catalog</span>
  <div class="header-counts" id="headerCounts"></div>
</header>

<div class="layout">

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-label">Item Type</div>
    <button class="nav-btn active" data-type="all" onclick="setType('all')">
      <span class="ico">📖</span> All Items <span class="badge" id="count-all">—</span>
    </button>
    <button class="nav-btn" data-type="weapon" onclick="setType('weapon')">
      <span class="ico">⚔️</span> Weapons <span class="badge" id="count-weapon">—</span>
    </button>
    <button class="nav-btn" data-type="armor" onclick="setType('armor')">
      <span class="ico">🛡️</span> Armor <span class="badge" id="count-armor">—</span>
    </button>
    <button class="nav-btn" data-type="consumable" onclick="setType('consumable')">
      <span class="ico">🧪</span> Consumables <span class="badge" id="count-consumable">—</span>
    </button>
    <button class="nav-btn" data-type="material" onclick="setType('material')">
      <span class="ico">🪨</span> Materials <span class="badge" id="count-material">—</span>
    </button>
    <button class="nav-btn" data-type="relic" onclick="setType('relic')">
      <span class="ico">💎</span> Relics <span class="badge" id="count-relic">—</span>
    </button>
    <button class="nav-btn" data-type="enchant" onclick="setType('enchant')">
      <span class="ico">✨</span> Enchants <span class="badge" id="count-enchant">—</span>
    </button>
    <button class="nav-btn" data-type="infusion" onclick="setType('infusion')">
      <span class="ico">🌀</span> Infusions <span class="badge" id="count-infusion">—</span>
    </button>
    <button class="nav-btn" data-type="artifact" onclick="setType('artifact')">
      <span class="ico">🏺</span> Artifacts <span class="badge" id="count-artifact">—</span>
    </button>

    <div class="sidebar-divider"></div>
    <div class="sidebar-label">Tier</div>
    <div class="tier-filters">
      <div class="tier-row">
        <button class="tier-btn active" data-tier="all" onclick="setTier('all')">All</button>
        <button class="tier-btn" data-tier="1" onclick="setTier('1')">T1</button>
        <button class="tier-btn" data-tier="2" onclick="setTier('2')">T2</button>
        <button class="tier-btn" data-tier="3" onclick="setTier('3')">T3</button>
        <button class="tier-btn" data-tier="4" onclick="setTier('4')">T4</button>
        <button class="tier-btn" data-tier="5" onclick="setTier('5')">T5</button>
        <button class="tier-btn" data-tier="6" onclick="setTier('6')">T6</button>
        <button class="tier-btn" data-tier="7" onclick="setTier('7')">T7</button>
        <button class="tier-btn" data-tier="8" onclick="setTier('8')">T8</button>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="main">
    <div class="toolbar">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="searchBox" placeholder="Search items… (Ctrl+K)" oninput="onSearch()">
      </div>
      <select class="sort-select" onchange="onSort(this.value)">
        <option value="name">Name A–Z</option>
        <option value="tier">Tier ↑</option>
        <option value="tier-desc">Tier ↓</option>
        <option value="type">Type</option>
      </select>
      <span class="result-info" id="resultInfo">Loading…</span>
    </div>

    <div class="grid-wrap">
      <div class="items-grid" id="itemsGrid">
        <div class="state-message" style="grid-column:1/-1">
          <div class="big"><span class="loading-orb"></span></div>
          <p>Fetching item catalog…</p>
        </div>
      </div>
      <div class="load-more-wrap" id="loadMoreWrap" style="display:none">
        <button class="load-more-btn" onclick="loadMore()">⬇ Load More</button>
      </div>
    </div>
  </div>

  <!-- Detail Drawer -->
  <div class="detail-drawer" id="detailDrawer">
    <div class="drawer-header">
      <span style="font-family:'Cinzel',serif;font-size:0.75rem;color:var(--text-dim)">Item Detail</span>
      <button class="drawer-close" onclick="closeDrawer()" title="Close (Esc)">✕</button>
    </div>
    <div id="drawerContent"></div>
  </div>
</div>

<script>
const SOURCES = [
  { url: './api/v1/master-weapons.json',     key: 'items',      type: 'weapon',     ico: '⚔️' },
  { url: './api/v1/master-armor.json',       key: 'items',      type: 'armor',      ico: '🛡️' },
  { url: './api/v1/master-consumables.json', key: 'items',      type: 'consumable', ico: '🧪' },
  { url: './api/v1/master-materials.json',   key: 'materials',  type: 'material',   ico: '🪨' },
  { url: './api/v1/master-relics.json',      key: 'relics',     type: 'relic',      ico: '💎' },
  { url: './api/v1/master-enchants.json',    key: 'enchants',   type: 'enchant',    ico: '✨' },
  { url: './api/v1/master-infusions.json',   key: 'infusions',  type: 'infusion',   ico: '🌀' },
  { url: './api/v1/master-artifacts.json',   key: 'artifacts',  type: 'artifact',   ico: '🏺' },
];

let allItems = [], filtered = [];
let activeType = 'all', activeTier = 'all', searchQ = '', sortKey = 'name';
let pageOffset = 0;
const PAGE = 80;

(async () => {
  const results = await Promise.allSettled(SOURCES.map(s => loadSource(s)));
  const counts = {};
  results.forEach((r, i) => {
    if (r.status === 'fulfilled') {
      const { type, items } = r.value;
      counts[type] = (counts[type] || 0) + items.length;
      allItems.push(...items);
    } else {
      console.warn('Load failed:', SOURCES[i].url, r.reason);
    }
  });

  let total = 0;
  Object.entries(counts).forEach(([t, n]) => {
    const el = document.getElementById('count-' + t);
    if (el) el.textContent = n.toLocaleString();
    total += n;
  });
  const allBadge = document.getElementById('count-all');
  if (allBadge) allBadge.textContent = total.toLocaleString();

  const hc = document.getElementById('headerCounts');
  if (hc) {
    [['Weapons', counts.weapon||0],['Armor', counts.armor||0],['Relics', counts.relic||0],['Enchants', counts.enchant||0]]
      .forEach(([label, n]) => {
        const d = document.createElement('div');
        d.className = 'hcount';
        d.innerHTML = `<strong>${n.toLocaleString()}</strong>${label}`;
        hc.appendChild(d);
      });
  }
  applyFilters();
})();

async function loadSource({ url, key, type, ico }) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(res.status);
  const data = await res.json();
  const raw = data[key] || [];
  return { type, items: raw.map(item => ({ ...item, _type: item.type || type, _ico: ico, _tierNum: parseInt(item.tier) || 1 })) };
}

function applyFilters() {
  const q = searchQ.toLowerCase();
  filtered = allItems.filter(item => {
    if (activeType !== 'all' && item._type !== activeType) return false;
    if (activeTier !== 'all' && item._tierNum !== parseInt(activeTier)) return false;
    if (q) {
      const hay = [item.name, item.category, item.subCategory, item.description, item._type].filter(Boolean).join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  filtered.sort((a, b) => {
    if (sortKey === 'name') return (a.name||'').localeCompare(b.name||'');
    if (sortKey === 'tier') return (a._tierNum||0) - (b._tierNum||0);
    if (sortKey === 'tier-desc') return (b._tierNum||0) - (a._tierNum||0);
    if (sortKey === 'type') return (a._type||'').localeCompare(b._type||'');
    return 0;
  });
  pageOffset = 0;
  renderGrid(true);
}

function renderGrid(fresh) {
  const grid = document.getElementById('itemsGrid');
  const loadWrap = document.getElementById('loadMoreWrap');
  const info = document.getElementById('resultInfo');

  if (!filtered.length) {
    grid.innerHTML = `<div class="state-message" style="grid-column:1/-1"><div class="big">🔍</div><p>No items match your filters.</p></div>`;
    loadWrap.style.display = 'none';
    info.textContent = '0 items';
    return;
  }
  if (fresh) grid.innerHTML = '';

  const batch = filtered.slice(pageOffset, pageOffset + PAGE);
  const frag = document.createDocumentFragment();
  batch.forEach((item, i) => {
    const card = makeCard(item);
    card.style.animationDelay = Math.min(i * 0.025, 0.5) + 's';
    frag.appendChild(card);
  });
  grid.appendChild(frag);

  pageOffset += batch.length;
  loadWrap.style.display = pageOffset < filtered.length ? 'block' : 'none';
  info.textContent = `${pageOffset.toLocaleString()} / ${filtered.length.toLocaleString()}`;
}

function loadMore() { renderGrid(false); }

function makeCard(item) {
  const div = document.createElement('div');
  div.className = 'item-card';
  const tc = item.tierColor || '#8b7355';
  const cat = item.category || item.subCategory || '';
  div.innerHTML = `
    <div class="tier-stripe" style="background:${tc}"></div>
    <div class="item-icon-wrap">
      ${item.iconUrl ? `<img src="${item.iconUrl}" alt="${item.name||''}" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement('span'),{className:'item-icon-fallback',textContent:'${item._ico}'}))">` : `<span class="item-icon-fallback">${item._ico}</span>`}
    </div>
    <div class="item-name">${item.name||'Unknown'}</div>
    <div class="item-meta">
      ${item.tierLabel ? `<span class="tag tag-tier" style="border-color:${tc};color:${tc}">${item.tierLabel}</span>` : ''}
      ${cat ? `<span class="tag tag-cat">${cat}</span>` : ''}
    </div>`;
  div.addEventListener('click', () => openDrawer(item, div));
  return div;
}

function openDrawer(item, cardEl) {
  document.querySelectorAll('.item-card.active').forEach(c => c.classList.remove('active'));
  cardEl.classList.add('active');
  const tc = item.tierColor || '#8b7355';
  const stats = item.stats || {};
  const statVals = Object.values(stats).map(Number).filter(v => !isNaN(v));
  const statMax = Math.max(...statVals, 100);
  const statHTML = Object.entries(stats).filter(([,v]) => Number(v) > 0).map(([k, v]) =>
    `<div class="stat-row"><span class="stat-key">${k}</span><div class="stat-bar-wrap"><div class="stat-bar" style="width:${Math.round(Number(v)/statMax*100)}%;background:${tc}"></div></div><span class="stat-val">${v}</span></div>`
  ).join('');
  const abilities = Array.isArray(item.abilities) ? item.abilities : [];
  const passives = Array.isArray(item.passives) ? item.passives : [];
  const tags = [item._type, item.category, item.subCategory, item.element, item.craftedBy, item.appliedAt]
    .filter(Boolean).filter((v,i,a) => a.indexOf(v)===i);

  document.getElementById('drawerContent').innerHTML = `
    <div class="drawer-icon">${item.iconUrl
      ? `<img src="${item.iconUrl}" alt="${item.name||''}" onerror="this.replaceWith(Object.assign(document.createElement('span'),{className:'drawer-icon-fb',textContent:'${item._ico}'}))"><span class="drawer-icon-fb" style="display:none">${item._ico}</span>`
      : `<span class="drawer-icon-fb">${item._ico}</span>`}</div>
    <div class="drawer-body">
      <div class="drawer-name">${item.name||''}</div>
      <div class="drawer-tier"><span style="border-color:${tc};color:${tc}">${item.tierLabel||'T'+(item._tierNum||1)}</span></div>
      ${item.description ? `<div class="drawer-desc">${item.description}</div>` : ''}
      ${tags.length ? `<div class="detail-tags">${tags.map(t=>`<span class="detail-tag">${t}</span>`).join('')}</div>` : ''}
      ${statHTML ? `<div class="drawer-section-title">Stats</div>${statHTML}` : ''}
      ${item.signature ? `<div class="drawer-section-title">Signature</div><div class="ability-list"><div class="ability-item signature">⚡ ${item.signature}</div></div>` : ''}
      ${abilities.length ? `<div class="drawer-section-title">Abilities</div><div class="ability-list">${abilities.map(a=>`<div class="ability-item">• ${a}</div>`).join('')}</div>` : ''}
      ${passives.length ? `<div class="drawer-section-title">Passives</div><div class="ability-list">${passives.map(p=>`<div class="ability-item">◈ ${typeof p==='object'?(p.name||JSON.stringify(p)):p}</div>`).join('')}</div>` : ''}
      ${item.lore && item.lore !== item.description ? `<div class="drawer-section-title">Lore</div><p style="font-size:0.78rem;color:var(--text-dim);font-style:italic;line-height:1.6">${item.lore}</p>` : ''}
      ${item.uuid ? `<div class="drawer-section-title">UUID</div><p style="font-family:'Cinzel',serif;font-size:0.6rem;color:var(--text-dim);word-break:break-all">${item.uuid}</p>` : ''}
    </div>`;

  document.getElementById('detailDrawer').classList.add('open');
}

function closeDrawer() {
  document.getElementById('detailDrawer').classList.remove('open');
  document.querySelectorAll('.item-card.active').forEach(c => c.classList.remove('active'));
}

function setType(type) {
  activeType = type;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.type === type));
  applyFilters();
}

function setTier(tier) {
  activeTier = tier;
  document.querySelectorAll('.tier-btn').forEach(b => b.classList.toggle('active', b.dataset.tier === tier));
  applyFilters();
}

let _st;
function onSearch() { clearTimeout(_st); _st = setTimeout(() => { searchQ = document.getElementById('searchBox').value; applyFilters(); }, 200); }
function onSort(v) { sortKey = v; applyFilters(); }

document.addEventListener('keydown', e => {
  if ((e.metaKey||e.ctrlKey) && e.key==='k') { e.preventDefault(); document.getElementById('searchBox').focus(); }
  if (e.key==='Escape') closeDrawer();
});
</script>
</body>
</html>
