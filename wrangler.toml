# ─── ObjectStore Cloudflare Worker ───────────────────────────────────
# API for asset upload, metadata search, and serving via R2 + D1
# Docs: workers/README.md
# ─────────────────────────────────────────────────────────────────────

name = "grudgeassets"
main = "workers/src/index.js"
compatibility_date = "2024-12-01"

# ── Environment variables ───────────────────────────────────────────
[vars]
ALLOWED_ORIGINS = "https://molochdagod.github.io,https://grudgewarlords.com,https://grudge-studio.com"
MAX_UPLOAD_SIZE = "104857600"   # 100 MB

# ── R2 Object Storage ────────────────────────────────────────────
# Consolidated to grudge-assets (has all content; objectstore-assets was empty)
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "grudge-assets"

# ── D1 SQL Database ────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "objectstore-meta"
database_id = "58edfe47-b748-4bd1-81c2-66e483c18a9a"

# ── Custom domain ──────────────────────────────────────────────────
# NOTE: objectstore.grudge-studio.com is currently served by grudge-r2-cdn Worker.
# This route is kept for reference but grudgeassets deploys independently.
[[routes]]
pattern = "objectstore.grudge-studio.com/*"
custom_domain = true
