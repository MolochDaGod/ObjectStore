# ─── ObjectStore Cloudflare Worker ───────────────────────────────────
# API for asset upload, metadata search, and serving via R2 + D1
# Docs: workers/README.md
# ─────────────────────────────────────────────────────────────────────

name = "grudgeassets"
main = "workers/src/index.js"
compatibility_date = "2024-12-01"
workers_dev = true

# ── Custom domain (grudge-edge-proxy owns zone route; worker also binds here) ───
routes = [
  { pattern = "objectstore.grudge-studio.com", custom_domain = true }
]

# ── Environment variables ──────────────────────────────────────
# Wildcards (a leading '*.') are supported and match any subdomain.
# The matcher in workers/src/index.js:corsResponse() handles them.
[vars]
ALLOWED_ORIGINS = "https://objectstore.grudge-studio.com,https://info.grudge-studio.com,https://grudgewarlords.com,https://www.grudgewarlords.com,https://grudge-studio.com,*.grudge-studio.com,https://gdevelop-assistant.vercel.app,https://grudgedot-launcher.vercel.app,https://grudge-engine-web.vercel.app,https://grudge-builder.vercel.app,https://grudge-warlords-game.vercel.app,https://grudachain.grudge-studio.com,*.vercel.app,*.puter.site,https://app.puter.com,https://grudgestudio.com,*.grudgestudio.com,http://localhost:3000,http://localhost:5173,http://localhost:8080,http://127.0.0.1:3000,http://127.0.0.1:5173,http://127.0.0.1:8080"
STATIC_JSON_BASE = "https://info.grudge-studio.com/api/v1"
MAX_UPLOAD_SIZE = "104857600"   # 100 MB

# ── Durable Objects ─────────────────────────────────────────────────
[durable_objects]
bindings = [
  { name = "CONVERSION_PIPELINE", class_name = "ConversionPipeline" }
]

# ── R2 Object Storage ──────────────────────────────────────────────
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "grudge-assets"

# ── D1 SQL Database ────────────────────────────────────────────
# Consolidated: uses grudge-objectstore (same as backend objectstore-api was using)
# Old objectstore-meta (58edfe47...) is deprecated — data migrated here
[[d1_databases]]
binding = "DB"
database_name = "grudge-objectstore"
database_id = "8fc367a8-9120-490e-a503-b0fcb755c044"

# ── DO Migrations (must be after all other [[array]] sections) ────
[[migrations]]
tag = "v1"
new_classes = ["ConversionPipeline"]
